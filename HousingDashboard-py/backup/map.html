<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LiveWise Dashboard</title>
    <link rel="stylesheet" href="css/main.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div class="bg-fade"></div>
    <div class="bg-fade"></div>
    <div class="bg-fade"></div>
    <div class="bg-fade"></div>
    <div class="bg-overlay"></div>
    <div id="wrapper">
        <div id="app">
            <div class="navbar">
                <div><strong>LiveWise | Map</strong></div>
                <div>
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="dataInsight.html">Data Insights</a>
                    <a href="compareAreas.html">Compare Areas</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
            <div class="layout-map">
                <div class="filter-box">
                    <h3>Filter Areas</h3>
                  
                    <!-- 🏠 Housing Cost -->
                    <label for="cost-range">Max Monthly Rent (£):</label>
                    <input type="range" id="cost-range" name="cost-range" min="200" max="2000" value="1000" step="50">
                    <div id="cost-value">£1000</div>
                  
                    <!-- 📊 Score Selector -->
                    <label for="score-select">Select Score:</label>
                    <select id="score-select" name="score-select">
                      <option value="none" selected disabled hidden>Choose a category</option>
                      <option value="crime">Crime Level</option>
                      <option value="schools">School Quality</option>
                      <option value="greenspace">Green Space Access</option>
                      <option value="amenities">Local Amenities</option>
                    </select>
                  
                    <!-- 📍 Optional Area -->
                    <label for="area-select">Choose Area (optional):</label>
                    <select id="area-select" name="area-select">
                      <option value="">All Areas</option>
                      <!-- Dynamically fill options via JS -->
                    </select>
                  
                    <!-- 🔘 Filter Button -->
                    <button id="apply-filters">Apply Filters</button>
                  </div>
                  
                <div class="map-box">
                    <div id="map" style="width: 100%; height: 100%;"></div>
                    <div id="info-box">
                        <div id="info-box-content">Click an area to see details here</div>
                    </div>                      
                </div>
            </div>
        </div>
    </div>    
    <script src="js/responsive.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
