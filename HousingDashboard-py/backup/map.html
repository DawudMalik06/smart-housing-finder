<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LiveTwiceByThinkingTwice Dashboard</title>
    <link rel="stylesheet" href="css/main.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div class="bg-fade"></div>
    <div class="bg-fade"></div>
    <div class="bg-fade"></div>
    <div class="bg-fade"></div>
    <div class="bg-overlay"></div>
    <div id="wrapper">
        <div id="app">
            <div class="navbar">
                <div><strong>LiveTwiceByThinkingTwice | Map</strong></div>
                <div>
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="compareAreas.html">Compare Areas</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
            <div class="layout-map">
                <div class="filter-box">
                    <h3>Filter Areas</h3>
                    <label for="cost-range">Max Monthly Rent (£):</label>
                    <input type="range" id="cost-range" name="cost-range" min="200" max="5000" value="1000" step="50">
                    <div id="cost-value">£1000</div>
                    <label for="score-select">Select Score:</label>
                    <select id="score-select" name="score-select">
                        <option value="none" selected disabled hidden>Choose a category</option>
                        <option value="schools">Liveability Score</option>
                        <option value="greenspace">Green Space Access</option>
                    </select>
                    <div id="score-slider-container" style="display: none;">
                        <label for="score-range">Min Livability Score:</label>
                        <input type="range" id="score-range" min="0.4" max="0.6" step="0.01" value="0.5">
                        <div id="score-value">0.5</div>
                    </div>

                </div>
                <div class="map-box">
                    <div id="map" style="width: 100%; height: 100%;"></div>
                    <div id="info-box">
                        <button id="close-info" class="close-btn">&times;</button>
                        <div id="info-box-content"></div>
                    </div>                                  
                </div>
            </div>
        </div>
    </div>    
    <script src="js/responsive.js"></script>
    <script src="js/map.js"></script>
    <script>
        const costRange = document.getElementById('cost-range');
        const costValue = document.getElementById('cost-value');
        costRange.addEventListener('input', () => {costValue.textContent = `£${costRange.value}`;});
    </script>
</body>
</html>
